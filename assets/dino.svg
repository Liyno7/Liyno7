<svg viewBox="0 0 600 160" xmlns="http://www.w3.org/2000/svg">
  <style>
    .px { fill: #535353; }
  </style>

  <!-- scrolling dashed ground -->
  <line x1="0" y1="130" x2="600" y2="130" stroke="#535353" stroke-width="2" stroke-dasharray="6 10">
    <animate attributeName="stroke-dashoffset" from="0" to="-160" dur="1.4s" repeatCount="indefinite"/>
  </line>

  <!-- cactus stream -->
  <g class="px">
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="600,0; -40,0" dur="3s" repeatCount="indefinite"/>
      <rect x="0" y="95" width="10" height="35"/>
      <rect x="-8" y="105" width="10" height="10"/>
      <rect x="10" y="102" width="10" height="10"/>
    </g>
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="600,0; -40,0" dur="3s" begin="1.8s" repeatCount="indefinite"/>
      <rect x="0" y="100" width="9" height="30"/>
    </g>
  </g>

  <!-- dino sprite (jumps as cactus passes under it) -->
  <g class="px">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 0,0; 0,-42; 0,-42; 0,0; 0,0"
      keyTimes="0; 0.78; 0.84; 0.87; 0.90; 1"
      dur="3s" repeatCount="indefinite"/>
    <!-- simple 8-bit t-rex silhouette -->
    <rect x="40" y="88" width="10" height="10"/>
    <rect x="40" y="78" width="20" height="10"/>
    <rect x="50" y="68" width="18" height="10"/>
    <rect x="60" y="88" width="8" height="10"/>
    <rect x="40" y="98" width="28" height="10"/>
    <rect x="40" y="108" width="10" height="14"/>
    <rect x="58" y="108" width="10" height="14"/>
    <rect x="34" y="98" width="8" height="6"/>
  </g>
</svg>
