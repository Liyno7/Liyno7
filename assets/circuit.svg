<svg viewBox="0 0 300 150" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pcbGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6C63FF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#8FE3E0" stop-opacity="1"/>
      <stop offset="100%" stop-color="#6C63FF" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="300" height="150" fill="#0f1420"/>

  <g stroke="#2a3550" stroke-width="2" fill="none" stroke-linecap="round">
    <path id="c1" d="M10 20 H90 V70 H150"/>
    <path id="c2" d="M10 130 H60 V90 H150"/>
    <path id="c3" d="M150 70 H210 V30 H290"/>
    <path id="c4" d="M150 90 H200 V120 H290"/>
    <path id="c5" d="M150 70 V90"/>
  </g>

  <g fill="#3a4568">
    <circle cx="90" cy="20" r="3"/><circle cx="90" cy="70" r="3"/>
    <circle cx="60" cy="130" r="3"/><circle cx="60" cy="90" r="3"/>
    <circle cx="150" cy="70" r="4"/><circle cx="150" cy="90" r="4"/>
    <circle cx="210" cy="70" r="3"/><circle cx="210" cy="30" r="3"/>
    <circle cx="200" cy="90" r="3"/><circle cx="200" cy="120" r="3"/>
  </g>

  <g stroke="url(#pcbGlow)" stroke-width="2.6" fill="none" stroke-linecap="round">
    <use href="#c1"><animate attributeName="stroke-dasharray" values="0,300;80,300" dur="2.4s" begin="0s" repeatCount="indefinite"/><animate attributeName="stroke-dashoffset" values="0;-300" dur="2.4s" begin="0s" repeatCount="indefinite"/></use>
    <use href="#c2"><animate attributeName="stroke-dasharray" values="0,300;80,300" dur="2.6s" begin="0.6s" repeatCount="indefinite"/><animate attributeName="stroke-dashoffset" values="0;-300" dur="2.6s" begin="0.6s" repeatCount="indefinite"/></use>
    <use href="#c3"><animate attributeName="stroke-dasharray" values="0,300;80,300" dur="2.2s" begin="1.2s" repeatCount="indefinite"/><animate attributeName="stroke-dashoffset" values="0;-300" dur="2.2s" begin="1.2s" repeatCount="indefinite"/></use>
    <use href="#c4"><animate attributeName="stroke-dasharray" values="0,300;80,300" dur="2.5s" begin="1.6s" repeatCount="indefinite"/><animate attributeName="stroke-dashoffset" values="0;-300" dur="2.5s" begin="1.6s" repeatCount="indefinite"/></use>
  </g>

  <g fill="#8FE3E0">
    <circle cx="150" cy="70" r="4"><animate attributeName="r" values="4;7;4" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="150" cy="90" r="4"><animate attributeName="r" values="4;7;4" dur="2.6s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="290" cy="30" r="4"><animate attributeName="r" values="4;7;4" dur="2.2s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="290" cy="120" r="4"><animate attributeName="r" values="4;7;4" dur="2.5s" begin="1.6s" repeatCount="indefinite"/></circle>
  </g>
</svg>
