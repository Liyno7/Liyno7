<svg viewBox="0 0 300 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <path id="starPath" d="M 230 100 C 210 60, 170 35, 120 25"/>
  </defs>

  <g font-family="Consolas, 'Fira Code', monospace" font-size="22" fill="#cdd6f4" text-anchor="middle">
    <!-- gentle bob -->
    <g>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,-5; 0,0" dur="2.6s" repeatCount="indefinite"/>

      <text x="150" y="55">∧__∧</text>

      <!-- eyes open -->
      <g>
        <animate attributeName="opacity" values="1;1;0;1;1" keyTimes="0;0.92;0.95;0.98;1" dur="3.5s" repeatCount="indefinite"/>
        <text x="150" y="80">( ・ω・ )</text>
      </g>
      <!-- eyes closed (blink) -->
      <g opacity="0">
        <animate attributeName="opacity" values="0;0;1;0;0" keyTimes="0;0.92;0.95;0.98;1" dur="3.5s" repeatCount="indefinite"/>
        <text x="150" y="80">( ・- ・ )</text>
      </g>

      <text x="150" y="105">⊂　　 ノ</text>
      <text x="150" y="130">しー-Ｊ</text>
    </g>
  </g>

  <!-- shooting star with sparkle trail -->
  <g fill="#FFD36E" font-family="Consolas, monospace" font-size="20">
    <text opacity="0">
      <animateMotion dur="3s" repeatCount="indefinite" path="M 40 130 C 90 90, 150 60, 230 25"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.85;1" dur="3s" repeatCount="indefinite"/>
      ☆
    </text>
  </g>
  <g fill="#8FE3E0" font-size="12" font-family="Consolas, monospace">
    <text x="60" y="120" opacity="0">
      <animate attributeName="opacity" values="0;1;0" begin="0.3s" dur="3s" repeatCount="indefinite"/>
      ・
    </text>
    <text x="90" y="100" opacity="0">
      <animate attributeName="opacity" values="0;1;0" begin="0.7s" dur="3s" repeatCount="indefinite"/>
      ﾟ
    </text>
    <text x="130" y="75" opacity="0">
      <animate attributeName="opacity" values="0;1;0" begin="1.1s" dur="3s" repeatCount="indefinite"/>
      ・
    </text>
    <text x="180" y="45" opacity="0">
      <animate attributeName="opacity" values="0;1;0" begin="1.5s" dur="3s" repeatCount="indefinite"/>
      ﾟ
    </text>
  </g>
</svg>
